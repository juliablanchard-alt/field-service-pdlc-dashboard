<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body>
<h1>Testing JSON Load</h1>
<pre id="output">Loading...</pre>
<script>
fetch('execution_data.json')
  .then(response => {
    document.getElementById('output').textContent = 'Response status: ' + response.status + '\n';
    return response.json();
  })
  .then(data => {
    document.getElementById('output').textContent += 'Success! Programs: ' + data.programs.length;
  })
  .catch(error => {
    document.getElementById('output').textContent += 'Error: ' + error.message;
  });
</script>
</body>
</html>
