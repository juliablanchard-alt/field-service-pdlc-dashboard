name: Refresh Phase 0 & Phase 1 Google Sheet Data

on:
  schedule:
    # Run twice daily Monday-Friday at 9 AM and 2 PM Pacific Time (17:00 and 22:00 UTC)
    - cron: '0 17 * * 1-5'  # 9 AM PT Mon-Fri
    - cron: '0 22 * * 1-5'  # 2 PM PT Mon-Fri
  workflow_dispatch:  # Allow manual triggering

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth

      - name: Fetch Phase 0 & Phase 1 data from Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 fetch_phase0_service_account.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/phase_0_programs.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update Phase 0 & Phase 1 data from Google Sheet [skip ci]"
            git push
          fi
