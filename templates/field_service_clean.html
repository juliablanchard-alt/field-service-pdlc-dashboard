            font-size: 13px;
        }

        .simple-project-name {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }

        .simple-epic-meta {
            font-size: 11px;
            color: #6b7280;
            padding-left: 24px;
        }

        /* Program */
        .card-program {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.12) 100%);
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid rgba(255, 255, 255, 0.4);
        }

        .card-program-icon {
            font-size: 16px;
        }

        .card-program-name {
            font-size: 14px;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            letter-spacing: -0.02em;
        }

        /* Project - Indented */
        .card-project {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            padding-left: 28px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            margin-bottom: 8px;
            position: relative;
        }

        .card-project::before {
            content: '';
            position: absolute;
            left: 14px;
            top: 50%;
            width: 8px;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }

        .card-project-icon {
            font-size: 13px;
        }

        .card-project-name {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Epic - More Indented */
        .card-epic {
            margin-bottom: 12px;
            padding-left: 40px;
            position: relative;
        }

        .card-epic::before {
            content: '';
            position: absolute;
            left: 14px;
            top: 8px;
            width: 8px;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }

        .card-epic-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .epic-link-icon {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .epic-link-icon:hover {
            color: white;
            transform: translateY(-1px);
        }

        .card-epic-name {
            font-size: 13px;
            font-weight: 700;
            color: white;
            line-height: 1.4;
            flex: 1;
        }

        /* Divider */
        .card-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 12px 0;
        }

        /* People */
        .card-people {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        .people-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .people-label {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            min-width: 60px;
        }

        .people-value {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 500;
        }

        /* Meta Row */
        .card-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .epic-counts {
            display: flex;
            gap: 8px;
        }

        .count-item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .count-icon {
            font-size: 12px;
        }

        .count-value {
            font-weight: 700;
        }

        .card-due-date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        .epic-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .epic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .epic-id {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        .epic-status {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-not-started {
            background: #f3f4f6;
            color: #6b7280;
        }

        .status-on-track {
            background: #d1fae5;
            color: #047857;
        }

        .status-on-watch {
            background: #fef3c7;
            color: #d97706;
        }

        .status-blocked {
            background: #fee2e2;
            color: #dc2626;
        }

        .status-completed {
            background: #dbeafe;
            color: #2563eb;
        }

        .epic-name {
            font-size: 13px;
            color: white;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .epic-progress {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0176D3, #0ea5e9);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            min-width: 35px;
        }

        .epic-footer {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Timeline View */
        .timeline-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 900px;
            margin: 0 auto;
        }

        .timeline {
            position: relative;
            padding-left: 40px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1));
        }

        .timeline-item {
            position: relative;
            margin-bottom: 32px;
        }

        .timeline-date {

            left: -120px;
            top: 0;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
        }

        .timeline-dot {
            position: absolute;
            left: -27px;
            top: 6px;
            width: 12px;
            height: 12px;
            background: #0176D3;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(1, 118, 211, 0.2);
        }

        .timeline-content {
            background: rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .timeline-title {
            font-size: 15px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .timeline-program {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Epic Table View */
        .epics-table-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow-x: auto;
        }

        .epics-table {
            width: 100%;
            border-collapse: collapse;
        }

        .epics-table thead th {
            text-align: left;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .epics-table tbody td {
            padding: 16px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .epics-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .epic-id-badge {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            font-family: monospace;
        }

        .status-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }

        .table-progress {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .table-progress .progress-bar {
            flex: 1;
            max-width: 120px;
        }

                grid-template-columns: 1fr;
            }

                position: static;
                margin-bottom: 8px;
